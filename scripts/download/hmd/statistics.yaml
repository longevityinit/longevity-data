# Source-level configuration and statistic catalogue for the Human
# Mortality Database. Each entry under `statistics:` becomes a snapshot at
# data/snapshots/hmd/<name>/<download-date>/.
#
# HMD's URL scheme has changed once (June 2022 rebuild) and is likely to
# change again, so all site URLs live here rather than hard-coded in
# Python. Verify on first run after any HMD redesign.
#
# To add a new statistic: append an entry under `statistics:` and add a
# matching parser at scripts/standardise/hmd/<name>.py.

site:
  base_url: https://www.mortality.org
  login_path: /Account/Login
  agreement_path: /Data/UserAgreement

statistics:
  - name: fltper_1x1
    description: >
      Female period life tables, 1×1 (single-year age × single-year period).
      Per-country text files inside the zip. Source for female period e0
      used in Oeppen & Vaupel's best-practice life expectancy envelope.
    url: https://www.mortality.org/File/GetDocument/hmd.v6/zip/by_statistic/fltper_1x1.zip
